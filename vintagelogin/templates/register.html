<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VintageLogin — Create Account</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="page">
  <div class="auth-card">

    <h1>Create Account</h1>
    <p class="subtitle">Join VintageLogin</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}" autocomplete="on">
      <div class="field">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Avirup Das"
          required
          autocomplete="name"
        />
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Password <span style="color:var(--tan);font-size:0.7em">(min 6 chars)</span></label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Choose a password"
          required
          minlength="6"
          autocomplete="new-password"
        />
      </div>

      <div class="field">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repeat your password"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn-primary">✦ Create Account</button>
    </form>

    <div class="divider">or</div>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in →</a>
    </p>

  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
