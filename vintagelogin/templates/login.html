<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VintageLogin — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="page">
  <div class="auth-card">

    <div class="login-illustration">🐱</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to VintageLogin</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="on">
      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-primary">✦ Sign In</button>
    </form>

    <div class="divider">or</div>

    <p class="auth-footer">
      No account yet?
      <a href="{{ url_for('auth.register') }}">Create one here →</a>
    </p>

  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
